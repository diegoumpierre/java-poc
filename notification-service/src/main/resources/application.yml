server:
  port: 8095

spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/101_notification?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:101_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000      # 30 seconds
      idle-timeout: 120000           # 2 minutes
      max-lifetime: 180000           # 3 minutes - menor que wait_timeout do MySQL
      keepalive-time: 30000          # 30 seconds - mantém conexões vivas
      validation-timeout: 5000       # 5 seconds

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-key-in-production}

app:
  security:
    enabled: false  # Gateway handles auth

  kafka:
    topics:
      email-queue: notification-email-queue
      notification-events: notification-events
      outbound-queue: notification-outbound-queue
      inbound-events: email-inbound-events
    consumer:
      group-id: notification-consumer

  scheduler:
    scheduled-rate: 60000        # 1 minute - process scheduled template emails
    retry-rate: 300000           # 5 minutes - retry failed template emails
    imap-poll-rate: 30000        # 30 seconds - IMAP polling
    throttled-email-rate: 10000  # 10 seconds - process throttled direct emails
    direct-retry-rate: 300000    # 5 minutes - retry failed direct emails

  # Platform tenant ID (for NOTIFICATION config type)
  platform-tenant-id: ${PLATFORM_TENANT_ID:00000000-0000-0000-0000-000000000000}

cors:
  enabled: false
  allowed-origins: http://localhost:3000,http://localhost:3001

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.poc.notification: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
