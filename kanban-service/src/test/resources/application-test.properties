# Test Configuration for Kanban Service
spring.application.name=kanban-service-test

# In-memory database for tests
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=

# Liquibase
spring.liquibase.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# MinIO
app.minio.enabled=false
app.minio.endpoint=http://localhost:9000
app.minio.accessKey=test
app.minio.secretKey=test
app.minio.bucket=test-bucket

# Logging
logging.level.com.poc=INFO
logging.level.org.springframework=WARN
