# Test Configuration for Auth Service
spring.application.name=auth-service-test

# Disable security for tests
app.security.enabled=false

# In-memory database for tests
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=

# Liquibase
spring.liquibase.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
jwt.secret=testSecretKeyForJwtTokenGenerationAndValidationPurposes
jwt.expiration=86400000
jwt.refresh-expiration=2592000000

# Storage Service
app.storage.enabled=false
app.storage.url=http://localhost:8084
app.storage.bucket=auth-files

# Logging
logging.level.com.poc=INFO
logging.level.org.springframework=WARN
