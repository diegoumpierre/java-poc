server:
  port: 8096
  tomcat:
    max-http-form-post-size: 2MB
    max-swallow-size: 2MB
  error:
    include-stacktrace: never

spring:
  application:
    name: chat-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/101_chat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:101_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 180000
      keepalive-time: 30000
      validation-timeout: 5000
      pool-name: ChatHikariPool

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis-default}
      timeout: 5000ms
      connect-timeout: 5000ms

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-key-in-production}

# Application Configuration
app:
  security:
    enabled: false  # Gateway handles auth

  kafka:
    topics:
      user-events: user-events
      livechat-events: livechat-events
      whatsapp-inbound-events: whatsapp-inbound-events
      email-inbound-events: email-inbound-events
    consumer:
      group-id: chat-consumer

  feign:
    whatsapp-service-url: ${WHATSAPP_SERVICE_URL:http://localhost:8104}
    email-service-url: ${EMAIL_SERVICE_URL:http://localhost:8108}

  inactivity-timeout:
    livechat-minutes: 30
    whatsapp-minutes: 1440
    email-minutes: 4320

  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,*}
    heartbeat-interval: 25000
    heartbeat-timeout: 30000

  retention:
    enabled: true
    cron: "0 0 3 * * *"
    batch-size: 1000
    default-days: 365

# CORS (habilitado para desenvolvimento)
cors:
  enabled: ${CORS_ENABLED:true}
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,*}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  exposed-headers: Authorization,Content-Disposition
  allow-credentials: true
  max-age: 3600

# Logging
logging:
  level:
    com.poc.chat: DEBUG
    org.springframework.data.jdbc: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
