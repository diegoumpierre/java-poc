spring:
  application:
    name: chat-service-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/structure/db.changelog-structure.yaml

  data:
    jdbc:
      repositories:
        enabled: true

  kafka:
    bootstrap-servers: localhost:9092

app:
  security:
    enabled: false
  kafka:
    topics:
      user-events: user-events-test
      livechat-events: livechat-events-test
    consumer:
      group-id: chat-consumer-test
      livechat-group-id: chat-livechat-test

logging:
  level:
    root: INFO
    com.poc: DEBUG
    org.springframework.jdbc: DEBUG
